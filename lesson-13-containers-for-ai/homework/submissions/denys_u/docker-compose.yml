# Run from homework root:
#   cp submissions/denys_u/.dockerignore boilerplate/.dockerignore
#   docker compose -f submissions/denys_u/docker-compose.yml up -d --build
#   docker compose -f submissions/denys_u/docker-compose.yml ps
#
# RAG API:       http://localhost:8000
# Phoenix UI:    http://localhost:6006
# Qdrant REST:   http://localhost:6333

services:
  rag:
    build:
      context: ../../boilerplate
      # dockerfile path is relative to context (boilerplate/), not this compose file
      dockerfile: ../submissions/denys_u/Dockerfile
    image: rag-optimized
    container_name: denys_u_rag
    env_file:
      - ../../boilerplate/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
      - phoenix

  qdrant:
    image: qdrant/qdrant:latest
    container_name: denys_u_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: denys_u_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: denys_u_phoenix
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "6006:6006"   # PHOENIX_PORT — UI + OTLP HTTP
      - "4317:4317"   # PHOENIX_GRPC_PORT
      - "9090:9090"   # Prometheus (optional)
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: denys_u_phoenix_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - phoenix_database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  qdrant_data:
  phoenix_database_data:

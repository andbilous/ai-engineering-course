name: lesson13-containers-for-ai

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lesson13-rag:multi
    container_name: lesson13-rag-app
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      LANGFUSE_HOST: http://langfuse:3000
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - redis
      - langfuse
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: lesson13-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lesson13-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: lesson13-postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: lesson13-langfuse
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: lesson13-dev-nextauth-secret
      SALT: lesson13-dev-salt
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
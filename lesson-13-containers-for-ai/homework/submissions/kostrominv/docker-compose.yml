# RAG service + supporting infra (Qdrant, Redis, Langfuse + its Postgres).
# The boilerplate app itself only needs OpenAI; the extra services are wired
# in to show a realistic local stack as required by the homework.

services:
  rag:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-boilerplate:multistage
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json,sys,urllib.request; d=json.load(urllib.request.urlopen('http://localhost:8000/health',timeout=4)); sys.exit(0 if d.get('status')=='ok' else 1)"
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-dev-secret-change-me
      SALT: local-dev-salt-change-me
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
  langfuse_db:
